name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Android build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            android-sdk-platform-23 \
            dalvik-exchange \
            aapt \
            zipalign \
            apksigner \
            default-jdk

      - name: "Security scan: no INTERNET permission"
        run: |
          echo "Checking AndroidManifest.xml..."
          if grep -i "android.permission.INTERNET" AndroidManifest.xml; then
            echo "❌ FAIL: INTERNET permission found!"
            exit 1
          fi
          echo "✅ PASS: No INTERNET permission"

      - name: "Security scan: no network code"
        run: |
          echo "Scanning source for network/tracking code..."
          PATTERNS="HttpURLConnection\|OkHttp\|Retrofit\|java\.net\.URL\|Socket(\|ServerSocket"
          PATTERNS="$PATTERNS\|DatagramSocket\|HttpClient\|javax\.net"
          if grep -rn "$PATTERNS" src/ 2>/dev/null; then
            echo "❌ FAIL: Network code found!"
            exit 1
          fi
          echo "✅ PASS: No network code"

      - name: "Security scan: no data collection"
        run: |
          echo "Scanning for data collection patterns..."
          PATTERNS="getDeviceId\|getSubscriberId\|ANDROID_ID\|advertisingId"
          PATTERNS="$PATTERNS\|firebase\|analytics\|mixpanel\|amplitude\|appsflyer"
          PATTERNS="$PATTERNS\|DexClassLoader\|InMemoryDexClassLoader\|PathClassLoader"
          if grep -rn "$PATTERNS" src/ 2>/dev/null; then
            echo "❌ FAIL: Data collection or dynamic code loading found!"
            exit 1
          fi
          echo "✅ PASS: No data collection or dynamic code loading"

      - name: "Security scan: verify permissions count"
        run: |
          COUNT=$(grep -c "uses-permission" AndroidManifest.xml)
          echo "Permissions declared: $COUNT"
          grep "uses-permission" AndroidManifest.xml
          if [ "$COUNT" -gt 5 ]; then
            echo "❌ FAIL: Too many permissions ($COUNT)"
            exit 1
          fi
          echo "✅ PASS: Permission count OK ($COUNT)"

      - name: Build APK
        run: |
          ANDROID_JAR=/usr/lib/android-sdk/platforms/android-23/android.jar
          DX=/usr/lib/android-sdk/build-tools/debian/dx
          mkdir -p build/gen build/classes

          aapt package -f -m -S res -J build/gen -M AndroidManifest.xml -I $ANDROID_JAR
          javac -source 1.8 -target 1.8 -bootclasspath $ANDROID_JAR -classpath $ANDROID_JAR \
            -d build/classes -Xlint:-options \
            build/gen/com/volumesteps/R.java src/com/volumesteps/*.java
          $DX --dex --output=build/classes.dex build/classes/
          aapt package -f -S res -M AndroidManifest.xml -I $ANDROID_JAR -F build/app.apk
          (cd build && aapt add app.apk classes.dex)
          zipalign -f 4 build/app.apk build/app-aligned.apk

      - name: Generate key & sign APK
        run: |
          keytool -genkeypair \
            -keystore build/key.jks \
            -alias volumesteps \
            -keyalg RSA -keysize 2048 \
            -validity 36500 \
            -storepass android -keypass android \
            -dname "CN=VolumeSteps Developer,O=VolumeSteps,C=IL" \
            2>/dev/null
          apksigner sign \
            --ks build/key.jks --ks-key-alias volumesteps \
            --ks-pass pass:android --key-pass pass:android \
            --out build/VolumeSteps.apk build/app-aligned.apk

      - name: Verify APK
        run: |
          apksigner verify build/VolumeSteps.apk
          echo ""
          echo "=== Final APK permissions ==="
          aapt d permissions build/VolumeSteps.apk
          echo ""
          ls -lh build/VolumeSteps.apk

      - name: Generate SHA-256 checksum
        run: |
          sha256sum build/VolumeSteps.apk | tee build/VolumeSteps.apk.sha256

      - name: VirusTotal scan
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          if [ -z "$VT_API_KEY" ]; then
            echo "⚠️ VT_API_KEY secret not set, skipping VirusTotal scan"
            echo "VT_RESULT=Skipped (no API key)" >> $GITHUB_ENV
            exit 0
          fi
          echo "Uploading APK to VirusTotal..."
          RESPONSE=$(curl -s --request POST \
            --url "https://www.virustotal.com/api/v3/files" \
            --header "x-apikey: $VT_API_KEY" \
            --form "file=@build/VolumeSteps.apk")

          ANALYSIS_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])" 2>/dev/null || echo "")

          if [ -z "$ANALYSIS_ID" ]; then
            echo "⚠️ Upload failed, skipping VirusTotal"
            echo "Response: $RESPONSE"
            echo "VT_RESULT=Upload failed" >> $GITHUB_ENV
            exit 0
          fi

          echo "Analysis ID: $ANALYSIS_ID"
          echo "Waiting for scan to complete..."
          sleep 30

          # Get results
          RESULT=$(curl -s \
            --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
            --header "x-apikey: $VT_API_KEY")

          MALICIOUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['stats']['malicious'])" 2>/dev/null || echo "?")
          UNDETECTED=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['stats']['undetected'])" 2>/dev/null || echo "?")

          # Get the permanent file URL
          SHA256=$(sha256sum build/VolumeSteps.apk | cut -d' ' -f1)
          VT_URL="https://www.virustotal.com/gui/file/$SHA256"

          echo ""
          echo "=== VirusTotal Results ==="
          echo "Malicious: $MALICIOUS"
          echo "Clean: $UNDETECTED"
          echo "Full report: $VT_URL"
          echo ""

          echo "VT_URL=$VT_URL" >> $GITHUB_ENV
          echo "VT_MALICIOUS=$MALICIOUS" >> $GITHUB_ENV
          echo "VT_CLEAN=$UNDETECTED" >> $GITHUB_ENV
          echo "VT_RESULT=Malicious: $MALICIOUS | Clean: $UNDETECTED — [Full Report]($VT_URL)" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VolumeSteps-${{ github.ref_name }}
          path: |
            build/VolumeSteps.apk
            build/VolumeSteps.apk.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: VolumeSteps ${{ github.ref_name }}
          body: |
            ## VolumeSteps ${{ github.ref_name }}

            ### 🔒 Security verification
            This APK was **built automatically from source** by GitHub Actions — not uploaded from anyone's computer.
            Click **Actions** tab → latest run to see the full public build log.

            | Check | Result |
            |---|---|
            | No INTERNET permission | ✅ Passed |
            | No network code in source | ✅ Passed |
            | No data collection / tracking | ✅ Passed |
            | Permissions count (max 5) | ✅ Passed |
            | VirusTotal | ${{ env.VT_RESULT }} |

            ### 📦 Install
            Download `VolumeSteps.apk` below, enable "Install from unknown sources", install.

            ### 🔍 Verify file integrity
            ```
            sha256sum VolumeSteps.apk
            ```
            Compare with `VolumeSteps.apk.sha256`
          files: |
            build/VolumeSteps.apk
            build/VolumeSteps.apk.sha256
